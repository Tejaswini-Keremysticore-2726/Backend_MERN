<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 30px; }
    h2 { margin-bottom: 20px; color: #333; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    th {
      background: #4f46e5;
      color: white;
      padding: 12px 16px;
      text-align: left;
    }
    td { padding: 12px 16px; border-bottom: 1px solid #eee; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9f9f9; }

    .online { color: green; font-weight: bold; }
    .offline { color: gray; }
  </style>
</head>
<body>

  <h2>👥 Logged In Users</h2>

  <table>
    <thead>
      <tr>
        <th>Full Name</th>
        <th>Email</th>
        <th>Status</th>
        <th>Last Login</th>
        <!-- <th>Joined</th> -->
      </tr>
    </thead>
    <tbody id="userTable">
      <tr><td colspan="5" style="text-align:center">Loading...</td></tr>
    </tbody>
  </table>

  <script>
    async function loadUsers() {
      try {
        const res = await fetch("/api/admin/logged-in-users", {
          credentials: "include" // cookie bhejne ke liye
        });
        const data = await res.json();

        const tbody = document.getElementById("userTable");
        tbody.innerHTML = "";

        if (data.users.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" style="text-align:center">No users found</td></tr>`;
          return;
        }

        data.users.forEach(user => {
          const row = `
            <tr>
              <td>${user.fullname}</td>
              <td>${user.email}</td>
              <td class="${user.isActive ? 'online' : 'offline'}">
                ${user.isActive ? "🟢 Online" : "⚫ Offline"}
              </td>
              <td>${new Date(user.lastLogin).toLocaleString()}</td>
              <td>${new Date(user.createdAt).toLocaleDateString()}</td>
            </tr>
          `;
          tbody.innerHTML += row;
        });

      } catch (err) {
        document.getElementById("userTable").innerHTML =
          `<tr><td colspan="5" style="color:red;text-align:center">Error loading users</td></tr>`;
      }
    }

    loadUsers();
  </script>

</body>
</html>
